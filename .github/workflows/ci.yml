name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - name: Type-check core
        run: npx tsc --noEmit -p packages/core/tsconfig.json

      - name: Type-check api
        run: npx tsc --noEmit -p packages/api/tsconfig.json

      - name: Type-check mcp-server
        run: npx tsc --noEmit -p packages/mcp-server/tsconfig.json

      - name: Type-check sdk-js
        run: npx tsc --noEmit -p packages/sdk-js/tsconfig.json

  build:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install
      - run: pnpm build

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - name: Run core tests
        run: cd packages/core && npx vitest run

  python-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python SDK
        working-directory: sdks/python
        run: pip install -e ".[dev]"

      - name: Check imports
        run: python -c "from ai_browser import AIBrowser, Session, PageContent; print('Python SDK imports OK')"

  docker:
    runs-on: ubuntu-latest
    needs: [build, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ai-browser:test .
